name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ledger-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: ledger-api/go.mod

      - name: Tidy modules
        run: |
          go env -w GONOSUMDB="*"
          go mod tidy

      - name: Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: ledger-api
          version: latest

      - name: Integration tests (testcontainers)
        run: go test ./tests/integration/... -v -count=1 -timeout=120s

  rust:
    name: Rust — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ledger-processor
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ledger-processor

      - name: fmt check
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy -- -D warnings

      - name: test
        run: cargo test

  build:
    name: Build images
    runs-on: ubuntu-latest
    needs: [go, rust]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ledger-api image
        uses: docker/build-push-action@v5
        with:
          context: ledger-api
          push: false
          tags: ledger-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ledger-processor image
        uses: docker/build-push-action@v5
        with:
          context: ledger-processor
          push: false
          tags: ledger-processor:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
